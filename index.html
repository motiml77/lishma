            firebase.initializeApp(firebaseConfig);

        } catch (e) {
            console.log("Firebase init error:", e);

        // ========== Statistics Functions ==========
        // יצירת/קבלת מזהה ייחודי למבקר
        const getVisitorId = () => {
            let visitorId = localStorage.getItem('visitorId');
            if (!visitorId) {
                visitorId = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('visitorId', visitorId);
            }
            return visitorId;
        };
        
        // רישום ביקור חדש (נקרא פעם אחת בכניסה לאתר)
        const recordVisit = async () => {
            if (!storage) return;
            
            const visitorId = getVisitorId();
            const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            const lastVisitDate = localStorage.getItem('lastVisitDate');
            
            // אם כבר ביקר היום - לא סופרים שוב
            if (lastVisitDate === today) {
                console.log("Already visited today");
                return;
            }
            
            try {
                // קריאת הסטטיסטיקות הקיימות
                let stats = { visitors: [], totalVisits: 0, downloads: 0 };
                try {
                    const statsRef = storage.ref('stats/stats.json');
                    const url = await statsRef.getDownloadURL();
                    const response = await fetch(url);
                    stats = await response.json();
                } catch (e) {
                    console.log("Creating new stats file");
                }
                
                // בדיקה אם זה מבקר חדש לגמרי
                const isNewVisitor = !stats.visitors.includes(visitorId);
                if (isNewVisitor) {
                    stats.visitors.push(visitorId);
                }
                
                // הגדלת מונה ביקורים
                stats.totalVisits = (stats.totalVisits || 0) + 1;
                
                // שמירה
                const jsonBlob = new Blob([JSON.stringify(stats)], { type: 'application/json' });
                const statsRef = storage.ref('stats/stats.json');
                await statsRef.put(jsonBlob);
                
                // עדכון תאריך ביקור אחרון
                localStorage.setItem('lastVisitDate', today);
                console.log("Visit recorded", isNewVisitor ? "(new visitor)" : "(returning visitor)");
            } catch (e) {
                console.log("Error recording visit:", e);
            }
        };
        
        // רישום הורדה/צפייה בעלון
        const recordDownload = async (newsletterName) => {
            if (!storage) return;
            
            try {
                let stats = { visitors: [], totalVisits: 0, downloads: 0 };
                try {
                    const statsRef = storage.ref('stats/stats.json');
                    const url = await statsRef.getDownloadURL();
                    const response = await fetch(url);
                    stats = await response.json();
                } catch (e) {}
                
                stats.downloads = (stats.downloads || 0) + 1;
                
                const jsonBlob = new Blob([JSON.stringify(stats)], { type: 'application/json' });
                const statsRef = storage.ref('stats/stats.json');
                await statsRef.put(jsonBlob);
                console.log("Download recorded for:", newsletterName);
            } catch (e) {
                console.log("Error recording download:", e);
            }
        };
        
        // טעינת סטטיסטיקות לממשק ניהול
        const loadStats = async () => {
            if (!storage) return { uniqueVisitors: 0, totalVisits: 0, downloads: 0 };
            
            try {
                const statsRef = storage.ref('stats/stats.json');
                const url = await statsRef.getDownloadURL();
                const response = await fetch(url);
                const stats = await response.json();
                return {
                    uniqueVisitors: stats.visitors?.length || 0,
                    totalVisits: stats.totalVisits || 0,
                    downloads: stats.downloads || 0
                };
            } catch (e) {
                return { uniqueVisitors: 0, totalVisits: 0, downloads: 0 };
            }
        };
        
        // רישום ביקור בטעינת הדף
        recordVisit();

            if (!storage) return { ...DEFAULT_SETTINGS };

        // ========== Unsubscribe Modal Component ==========
        function UnsubscribeModal({ onClose }) {
            const [email, setEmail] = React.useState("");
            const [status, setStatus] = React.useState(null); // 'loading', 'success', 'error', 'not-found'
            
            const handleUnsubscribe = async (e) => {
                e.preventDefault();
                
                if (!email || !email.includes('@')) {
                    setStatus('error');
                    return;
                }
                
                setStatus('loading');
                
                try {
                    if (storage) {
                        // קריאת הרשימה הקיימת
                        let subscribers = [];
                        try {
                            const listRef = storage.ref('subscribers/list.json');
                            const url = await listRef.getDownloadURL();
                            const response = await fetch(url);
                            const data = await response.json();
                            subscribers = data.subscribers || [];
                        } catch (e) {
                            setStatus('not-found');
                            return;
                        }
                        
                        // חיפוש המייל
                        const index = subscribers.findIndex(s => s.email === email);
                        if (index === -1) {
                            setStatus('not-found');
                            return;
                        }
                        
                        // הסרת המייל
                        subscribers.splice(index, 1);
                        
                        // שמירה חזרה
                        const jsonBlob = new Blob([JSON.stringify({ subscribers })], { type: 'application/json' });
                        const listRef = storage.ref('subscribers/list.json');
                        await listRef.put(jsonBlob);
                        
                        setStatus('success');
                    } else {
                        // Demo mode
                        await new Promise(r => setTimeout(r, 1000));
                        setStatus('success');
                    }
                } catch (err) {
                    console.error(err);
                    setStatus('error');
                }
            };
            
            return (
                <div className="admin-scope fixed inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 animate-fade-in">

                            <button onClick={onClose} className="text-stone-400 hover:text-stone-600">
                                <Icons.X />
                            </button>
                        </div>
                        
                        {status === 'success' ? (
                            <div className="text-center py-8">
                                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600">
                                    <Icons.Check />
                                </div>
                                <h3 className="text-xl font-bold text-stone-800 mb-2">הוסרת בהצלחה</h3>
                                <p className="text-stone-600">לא תקבל יותר עלונים למייל זה.</p>
                                <button
                                    onClick={onClose}
                                    className="mt-6 px-6 py-2 bg-stone-100 text-stone-700 rounded-lg hover:bg-stone-200"
                                >
                                    סגור
                                </button>
                            </div>
                        ) : (
                            <>
                                <p className="text-stone-600 mb-6">
                                    הכנס את כתובת המייל שברצונך להסיר מרשימת התפוצה
                                </p>
                                
                                <form onSubmit={handleUnsubscribe} className="space-y-4">
                                    <div className="relative">
                                        <input
                                            type="email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            placeholder="כתובת המייל"
                                            className="w-full px-4 py-3 pr-11 text-right bg-white border-2 border-stone-200 rounded-xl focus:border-amber-500 focus:ring-4 focus:ring-amber-500/20"

                                        </span>
                                    </div>
                                    
                                    {status === 'not-found' && (
                                        <p className="text-amber-600 text-sm">כתובת המייל לא נמצאה ברשימה</p>
                                    )}
                                    {status === 'error' && (
                                        <p className="text-red-600 text-sm">שגיאה, נסה שוב</p>
                                    )}
                                    
                                    <button
                                        type="submit"

                                    >
                                        {status === 'loading' ? (
                                            <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                        ) : (
                                            <>
                                                <Icons.X />
                                                הסר מהרשימה
                                            </>
                                        )}
                                    </button>
                                </form>
                            </>
                        )}
                    </div>
                </div>

                            <p className="mb-4 text-sm">בית מדרש לשמה • כתב עת של הרב בנימין טבדי</p>
                            <button
                                onClick={() => setShowUnsubscribe(true)}
                                className="text-[#7c8694] hover:text-white text-sm underline transition-colors"
                            >
                                ביטול הרשמה לעלון
                            </button>
                        </div>
                    </footer>

                    {/* Unsubscribe Modal */}
                    {showUnsubscribe && <UnsubscribeModal onClose={() => setShowUnsubscribe(false)} />}
                </div>
            );
        }

        // ========== Admin Panel Component ==========
        function AdminPanel({ onClose, newsletters, setNewsletters, siteSettings, setSiteSettings }) {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [loginEmail, setLoginEmail] = React.useState("");
            const [loginPassword, setLoginPassword] = React.useState("");
            const [loginError, setLoginError] = React.useState("");
            const [rememberMe, setRememberMe] = React.useState(false);

            const [subscribers, setSubscribers] = React.useState([]);
            const [newsletterNumber, setNewsletterNumber] = React.useState("");
            const [selectedNewsletter, setSelectedNewsletter] = React.useState(null);
            const [uploadFile, setUploadFile] = React.useState(null);
            const [uploadTopics, setUploadTopics] = React.useState("");
            const [uploadSubtitle, setUploadSubtitle] = React.useState("");
            const [showTagSuggestions, setShowTagSuggestions] = React.useState(false);
            const topicsInputRef = React.useRef(null);

            // כל האשטגים הקיימים ממוינים לפי א-ב
            const existingTags = React.useMemo(() => {
                const tags = new Set();
                newsletters.forEach(n => {
                    (n.topics || []).forEach(t => {
                        t.split('#').map(p => p.trim().replace(/,\s*$/, '').trim()).filter(p => p.length > 0).forEach(p => tags.add(p));
                    });
                });
                return [...tags].sort((a, b) => a.localeCompare(b, 'he'));
            }, [newsletters]);
            const [uploading, setUploading] = React.useState(false);
            const [sendingEmail, setSendingEmail] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('upload');

            // שדות מייל
            const [emailSubject, setEmailSubject] = React.useState("");
            const [emailBody, setEmailBody] = React.useState("");
            const [saveAsTemplate, setSaveAsTemplate] = React.useState(false);

            // סטטיסטיקות
            const [stats, setStats] = React.useState({ uniqueVisitors: 0, totalVisits: 0, downloads: 0 });
            const [loadingStats, setLoadingStats] = React.useState(false);

            // הגדרות אתר (אודות + קישור תרומות)
            const [settingsForm, setSettingsForm] = React.useState(siteSettings || DEFAULT_SETTINGS);
            const [savingSettings, setSavingSettings] = React.useState(false);
            const [settingsSaved, setSettingsSaved] = React.useState(false);
            React.useEffect(() => { setSettingsForm(siteSettings || DEFAULT_SETTINGS); }, [siteSettings]);

            const updateSettingField = (key, value) => {
                setSettingsForm(prev => ({ ...prev, [key]: value }));
                setSettingsSaved(false);
            };

            const handleSaveSettings = async () => {
                setSavingSettings(true);
                setSettingsSaved(false);
                try {
                    if (storage) {
                        await saveSiteSettings(settingsForm);
                    }
                    setSiteSettings(settingsForm);
                    setSettingsSaved(true);
                } catch (err) {
                    console.error('Error saving settings:', err);
                    alert('שגיאה בשמירת ההגדרות: ' + err.message);
                }
                setSavingSettings(false);
            };

            // ניקוי localStorage ישן (חד-פעמי)
            React.useEffect(() => {
                localStorage.removeItem('adminLogin');
            }, []);

            // בדיקת מצב התחברות דרך Firebase Auth
            React.useEffect(() => {
                if (!auth) {
                    setAuthLoading(false);
                    return;
                }
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setIsLoggedIn(!!user);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // טעינת תבנית מייל שמורה
            React.useEffect(() => {
                try {
                    const savedTemplate = JSON.parse(localStorage.getItem('emailTemplate') || 'null');
                    if (savedTemplate) {
                        setEmailBody(savedTemplate.body || "");
                    }
                } catch {}
            }, []);

            // טעינת נרשמים בכניסה
            React.useEffect(() => {
                if (isLoggedIn) {
                    loadSubscribers();
                    const fetchStats = async () => {
                        setLoadingStats(true);
                        const s = await loadStats();
                        setStats(s);
                        setLoadingStats(false);
                    };
                    fetchStats();
                }
            }, [isLoggedIn]);

            // עדכון שדות המייל כשבוחרים עלון
            React.useEffect(() => {
                if (selectedNewsletter) {
                    setEmailSubject(`עלון מספר ${selectedNewsletter.number} - בית מדרש לשמה`);
                    try {
                        const savedTemplate = JSON.parse(localStorage.getItem('emailTemplate') || 'null');
                        if (savedTemplate && savedTemplate.body) {
                            setEmailBody(savedTemplate.body.replace(/\[עלון\]/g, selectedNewsletter.number));
                        } else {
                            setEmailBody(`שלום וברכה!\n\nעלון מספר ${selectedNewsletter.number} מוכן עבורך.\n\nשבת שלום!`);
                        }
                    } catch {
                        setEmailBody(`שלום וברכה!\n\nעלון מספר ${selectedNewsletter.number} מוכן עבורך.\n\nשבת שלום!`);
                    }
                }
            }, [selectedNewsletter]);

            // Login - רק דרך Firebase Auth
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError("");

                if (!auth) {
                    setLoginError("שירות ההתחברות אינו זמין כרגע. נסה שוב מאוחר יותר.");
                    return;
                }

                try {
                    const persistence = rememberMe
                        ? firebase.auth.Auth.Persistence.LOCAL
                        : firebase.auth.Auth.Persistence.SESSION;
                    await auth.setPersistence(persistence);
                    await auth.signInWithEmailAndPassword(loginEmail, loginPassword);
                    // onAuthStateChanged יעדכן את isLoggedIn
                } catch (err) {
                    console.error("Login error:", err.code);
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        setLoginError("שם משתמש או סיסמה שגויים");
                    } else if (err.code === 'auth/too-many-requests') {
                        setLoginError("יותר מדי ניסיונות. נסה שוב מאוחר יותר.");
                    } else {
                        setLoginError("שגיאה בהתחברות. נסה שוב.");
                    }
                }
            };
            
            // התנתקות
            const handleLogout = async () => {
                try {
                    if (auth) await auth.signOut();
                } catch (err) {
                    console.error("Logout error:", err);
                }
                setIsLoggedIn(false);
            };

            // Load subscribers
            const loadSubscribers = async () => {
                console.log("Loading subscribers, storage:", !!storage);
                if (storage) {
                    try {
                        const listRef = storage.ref('subscribers/list.json');
                        const url = await listRef.getDownloadURL();
                        console.log("Subscribers URL:", url);
                        const response = await fetch(url);
                        const data = await response.json();
                        console.log("Loaded subscribers:", data.subscribers?.length || 0);
                        setSubscribers(data.subscribers || []);
                    } catch (e) {
                        // אין קובץ עדיין
                        console.log("No subscribers file yet:", e.message);
                        setSubscribers([]);
                    }
                } else {
                    console.log("No storage - using demo data");
                    // Demo data
                    setSubscribers([
                        { email: 'user1@example.com', subscribedAt: new Date().toISOString() },
                        { email: 'user2@example.com', subscribedAt: new Date().toISOString() },
                    ]);
                }
            };

            // Upload PDF
            const handleUpload = async () => {
                if (!uploadFile || !newsletterNumber) return;

                const number = parseInt(newsletterNumber);
                if (isNaN(number) || number < 1) {
                    alert('יש להזין מספר עלון תקין');
                    return;
                }

                setUploading(true);
                try {
                    const fileName = uploadFile.name;
                    const timestamp = Date.now();
                    const baseFileName = `${timestamp}_${fileName}`;
                    const topics = uploadTopics.split(/[,#]/).map(t => t.trim()).filter(t => t.length > 0).map(t => '#' + t);

                    const subtitle = uploadSubtitle.trim();

                    if (storage) {
                        // העלאת הקובץ לתיקיית העלון
                        const ref = storage.ref(`newsletters/${number}/${baseFileName}`);
                        await ref.put(uploadFile);
                        const url = await ref.getDownloadURL();

                        // העלאת נושאים
                        if (topics.length > 0) {
                            const topicsJson = JSON.stringify({ topics });
                            const topicsBlob = new Blob([topicsJson], { type: 'application/json' });
                            const topicsRef = storage.ref(`newsletters/${number}/${timestamp}_${fileName.replace(/\.[^/.]+$/, '')}_topics.json`);
                            await topicsRef.put(topicsBlob);
                        }

                        // שמירת/עדכון תת-כותרת
                        if (subtitle) {
                            const metaJson = JSON.stringify({ subtitle });
                            const metaBlob = new Blob([metaJson], { type: 'application/json' });
                            const metaRef = storage.ref(`newsletters/${number}/_meta.json`);
                            await metaRef.put(metaBlob);
                        }

                        // עדכון מקומי
                        const newFile = { name: fileName, url: url, topics: topics, uploadedAt: new Date().toISOString() };
                        const existing = newsletters.find(n => n.number === number);
                        let updatedNewsletters;

                        if (existing) {
                            updatedNewsletters = newsletters.map(n => {
                                if (n.number === number) {
                                    const mergedTopics = [...new Set([...(n.topics || []), ...topics])];
                                    return { ...n, files: [...(n.files || []), newFile], pdfUrl: url, hasFiles: true, subtitle: subtitle || n.subtitle, topics: mergedTopics };
                                }
                                return n;
                            });
                        } else {
                            updatedNewsletters = [...newsletters, {
                                id: `alon-${number}`, number, name: `עלון ${number}`,
                                pdfUrl: url, hasFiles: true, files: [newFile], subtitle: subtitle, topics: topics
                            }].sort((a, b) => a.number - b.number);
                        }
                        setNewsletters(updatedNewsletters);
                        alert('הקובץ הועלה בהצלחה!');
                    } else {
                        // Demo mode
                        const localUrl = URL.createObjectURL(uploadFile);
                        const newFile = { name: uploadFile.name, url: localUrl, topics: topics, uploadedAt: new Date().toISOString() };
                        const existing = newsletters.find(n => n.number === number);
                        let updatedNewsletters;

                        if (existing) {
                            updatedNewsletters = newsletters.map(n => {
                                if (n.number === number) {
                                    const mergedTopics = [...new Set([...(n.topics || []), ...topics])];
                                    return { ...n, files: [...(n.files || []), newFile], pdfUrl: localUrl, hasFiles: true, subtitle: subtitle || n.subtitle, topics: mergedTopics };
                                }
                                return n;
                            });
                        } else {
                            updatedNewsletters = [...newsletters, {
                                id: `alon-${number}`, number, name: `עלון ${number}`,
                                pdfUrl: localUrl, hasFiles: true, files: [newFile], subtitle: subtitle, topics: topics
                            }].sort((a, b) => a.number - b.number);
                        }
                        setNewsletters(updatedNewsletters);
                        alert('הקובץ הועלה בהצלחה! (מצב דמו)');
                    }
                    setUploadTopics("");
                    setUploadSubtitle("");
                    setUploadFile(null);
                } catch (err) {
                    alert('שגיאה בהעלאה: ' + err.message);
                    console.error(err);
                }
                setUploading(false);
            };

            // Send to mailing list (Note: requires backend/Cloud Function)
            // URL של ה-Worker לשליחת מיילים
            const EMAIL_WORKER_URL = "https://beit-midrash-email.motiml77.workers.dev";
            
            const handleSendToList = async () => {
                if (!selectedNewsletter) {
                    alert('יש לבחור עלון');
                    return;
                }
                if (subscribers.length === 0) {
                    alert('אין נרשמים ברשימה');
                    return;
                }

                let pdfUrl = selectedNewsletter.pdfUrl;
                let fileName = `עלון-${selectedNewsletter.number}.pdf`;
                let topics = [];

                if (selectedNewsletter.hasFiles && (!selectedNewsletter.files || selectedNewsletter.files.length === 0)) {
                    try {
                        const folderRef = storage.ref(`newsletters/${selectedNewsletter.number}`);
                        const result = await folderRef.listAll();
                        const contentFiles = result.items.filter(item => !item.name.endsWith('_topics.json'));
                        if (contentFiles.length > 0) {
                            pdfUrl = await contentFiles[0].getDownloadURL();
                            fileName = contentFiles[0].name;
                        }
                    } catch (e) {
                        console.error("Error loading files:", e);
                    }
                } else if (selectedNewsletter.files && selectedNewsletter.files.length > 0) {
                    pdfUrl = selectedNewsletter.files[0].url;
                    fileName = selectedNewsletter.files[0].name;
                    topics = selectedNewsletter.files[0].topics || [];
                }

                if (!pdfUrl) {
                    alert('אין קובץ בעלון זה');
                    return;
                }

                const confirmSend = confirm(`לשלוח את עלון מספר ${selectedNewsletter.number} ל-${subscribers.length} נרשמים?`);
                if (!confirmSend) return;

                setSendingEmail(true);
                try {
                    if (EMAIL_WORKER_URL) {
                        const response = await fetch(EMAIL_WORKER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                emails: subscribers.map(s => s.email),
                                subject: emailSubject,
                                newsletterName: `עלון ${selectedNewsletter.number}`,
                                pdfUrl: pdfUrl,
                                fileName: fileName,
                                topics: topics,
                                customBody: emailBody
                            })
                        });
                        const result = await response.json();
                        if (result.success) {
                            alert(`העלון נשלח בהצלחה ל-${result.sent} נרשמים!`);
                        } else {
                            alert('שגיאה בשליחה: ' + result.error);
                        }
                    } else {
                        alert('שירות המיילים עדיין לא הוגדר.');
                    }
                } catch (err) {
                    alert('שגיאה בשליחה: ' + err.message);
                    console.error(err);
                }
                setSendingEmail(false);
            };

            if (authLoading) {
                return (
                    <div className="admin-scope fixed inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 animate-fade-in text-center">
                            <div className="w-12 h-12 border-4 border-amber-200 border-t-amber-600 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-stone-600">בודק הרשאות...</p>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="admin-scope fixed inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 animate-fade-in">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold serif-font">כניסת מנהל</h2>
                                <button onClick={onClose} className="text-stone-400 hover:text-stone-600">
                                    <Icons.X />
                                </button>
                            </div>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input
                                    type="email"
                                    value={loginEmail}
                                    onChange={(e) => setLoginEmail(e.target.value)}
                                    placeholder="מייל"
                                    className="w-full px-4 py-3 border-2 border-stone-200 rounded-xl focus:border-amber-500"
                                    dir="ltr"
                                />
                                <input
                                    type="password"
                                    value={loginPassword}
                                    onChange={(e) => setLoginPassword(e.target.value)}
                                    placeholder="סיסמה"
                                    className="w-full px-4 py-3 border-2 border-stone-200 rounded-xl focus:border-amber-500"
                                    dir="ltr"
                                />
                                <label className="flex items-center gap-2 cursor-pointer">
                                    <input
                                        type="checkbox"
                                        checked={rememberMe}
                                        onChange={(e) => setRememberMe(e.target.checked)}
                                        className="w-4 h-4 text-amber-600 rounded focus:ring-amber-500"
                                    />
                                    <span className="text-sm text-stone-600">זכור אותי</span>
                                </label>
                                {loginError && <p className="text-red-600 text-sm">{loginError}</p>}
                                <button
                                    type="submit"
                                    className="w-full py-3 bg-amber-600 text-white rounded-xl font-bold hover:bg-amber-700"
                                >
                                    התחבר
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="admin-scope fixed inset-0 bg-stone-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm overflow-auto">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden animate-fade-in">
                        {/* Header */}
                        <div className="flex justify-between items-center p-6 border-b bg-stone-50">
                            <h2 className="text-2xl font-bold serif-font flex items-center gap-3">
                                <Icons.Settings />
                                ניהול האתר
                            </h2>
                            <div className="flex items-center gap-2">
                                <a
                                    href="gemini-file-admin.html"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="px-3 py-1.5 text-sm text-amber-700 hover:bg-amber-50 rounded-lg transition-colors flex items-center gap-1"
                                >
                                    סריקת תוכן
                                </a>
                                <button 
                                    onClick={handleLogout}
                                    className="px-3 py-1.5 text-sm text-stone-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                >
                                    התנתק
                                </button>
                                <button onClick={onClose} className="text-stone-400 hover:text-stone-600">
                                    <Icons.X />
                                </button>
                            </div>
                        </div>
                        
                        {/* Tabs */}
                        <div className="flex border-b">
                            <button
                                onClick={() => setActiveTab('upload')}
                                className={`flex-1 py-4 text-center font-medium transition-colors ${activeTab === 'upload' ? 'bg-amber-50 text-amber-700 border-b-2 border-amber-600' : 'text-stone-500 hover:bg-stone-50'}`}
                            >
                                <span className="flex items-center justify-center gap-2">
                                    <Icons.Upload />
                                    העלאה
                                </span>
                            </button>
                            <button
                                onClick={() => setActiveTab('subscribers')}
                                className={`flex-1 py-4 text-center font-medium transition-colors ${activeTab === 'subscribers' ? 'bg-amber-50 text-amber-700 border-b-2 border-amber-600' : 'text-stone-500 hover:bg-stone-50'}`}
                            >
                                <span className="flex items-center justify-center gap-2">
                                    <Icons.Users />
                                    נרשמים
                                </span>
                            </button>
                            <button
                                onClick={() => setActiveTab('send')}
                                className={`flex-1 py-4 text-center font-medium transition-colors ${activeTab === 'send' ? 'bg-amber-50 text-amber-700 border-b-2 border-amber-600' : 'text-stone-500 hover:bg-stone-50'}`}
                            >
                                <span className="flex items-center justify-center gap-2">
                                    <Icons.Send />
                                    שליחה
                                </span>
                            </button>
                            <button
                                onClick={() => setActiveTab('stats')}
                                className={`flex-1 py-4 text-center font-medium transition-colors ${activeTab === 'stats' ? 'bg-amber-50 text-amber-700 border-b-2 border-amber-600' : 'text-stone-500 hover:bg-stone-50'}`}
                            >
                                <span className="flex items-center justify-center gap-2">
                                    📊
                                    סטטיסטיקות
                                </span>
                            </button>
                            <button
                                onClick={() => setActiveTab('site')}
                                className={`flex-1 py-4 text-center font-medium transition-colors ${activeTab === 'site' ? 'bg-amber-50 text-amber-700 border-b-2 border-amber-600' : 'text-stone-500 hover:bg-stone-50'}`}
                            >
                                <span className="flex items-center justify-center gap-2">
                                    <Icons.Settings />
                                    אתר ואודות
                                </span>
                            </button>
                        </div>
                        
                        {/* Content */}
                        <div className="p-6 overflow-y-auto max-h-[60vh]">
                            {activeTab === 'upload' && (
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-medium text-stone-700 mb-2">מספר עלון:</label>
                                        <input
                                            type="number"
                                            min="1"
                                            value={newsletterNumber}
                                            onChange={(e) => setNewsletterNumber(e.target.value)}
                                            placeholder="הזן מספר עלון (לדוגמה: 1)"
                                            className="w-full px-4 py-3 border-2 border-stone-200 rounded-xl focus:border-amber-500 text-center text-lg font-bold"
                                            dir="ltr"
                                        />
                                        {newsletterNumber && newsletters.find(n => n.number === parseInt(newsletterNumber)) && (
                                            <p className="text-xs text-amber-600 mt-1">עלון זה כבר קיים - הקובץ יתווסף אליו</p>
                                        )}
                                    </div>

                                    {/* קבצים קיימים בעלון זה */}
                                    {newsletterNumber && (() => {
                                        const existing = newsletters.find(n => n.number === parseInt(newsletterNumber));
                                        if (!existing || !existing.files || existing.files.length === 0) return null;
                                        return (
                                            <div className="bg-stone-50 rounded-xl p-4">
                                                <h4 className="font-medium text-stone-700 mb-3">קבצים קיימים בעלון {newsletterNumber}:</h4>
                                                <div className="space-y-2">
                                                    {existing.files.map((file, idx) => (
                                                        <div key={idx} className="flex items-center justify-between p-3 bg-white rounded-lg border">
                                                            <span className="text-sm text-stone-600 truncate flex-1">{file.name}</span>
                                                            <a href={file.url} target="_blank" className="text-amber-600 hover:text-amber-700 text-sm mr-2">צפה</a>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()}

                                    <div>
                                        <label className="block text-sm font-medium text-stone-700 mb-2">תת-כותרת (תוצג מתחת לשם העלון בסרגל):</label>
                                        <input
                                            type="text"
                                            value={uploadSubtitle}
                                            onChange={(e) => setUploadSubtitle(e.target.value)}
                                            placeholder="לדוגמה: חנוכה תשפ״ה"
                                            className="w-full px-4 py-3 border-2 border-stone-200 rounded-xl focus:border-amber-500"
                                            dir="rtl"
                                        />
                                        <p className="text-xs text-stone-400 mt-1">אופציונלי - מוצג בכתב קטן מתחת לשם העלון</p>
                                    </div>

        function App() {

            const [editNumber, setEditNumber] = React.useState('');
