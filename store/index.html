    <style>
        body {
            font-family: 'Frank Ruhl Libre', serif;
            background-color: #FBF9F4;
            color: #2C1810;
        }

        .gold-text {
            background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 2px rgba(0, 0, 0, 0.15);
        }

        .price-gold {
            background: linear-gradient(to bottom, #e9cf86, #C8A24B, #a07e2c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-font {
            font-family: 'Bona Nova SC', serif;
        }

        .animate-fade {
            animation: fadeIn 0.5s ease-in;
        }

        .cart-slide {
            animation: cartSlide 0.28s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cartSlide {
            from { transform: translateX(40px); opacity: 0.4; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .loader-ring {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }

        .loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 8px solid #2C1810;
            border-radius: 50%;
            animation: loader-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #2C1810 transparent transparent transparent;
        }

        .loader-ring div:nth-child(1) {
            animation-delay: -0.45s;
        }

        .loader-ring div:nth-child(2) {
            animation-delay: -0.3s;
        }

        .loader-ring div:nth-child(3) {
            animation-delay: -0.15s;
        }

        @keyframes loader-ring {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .drag-over {
            border: 2px dashed #2C1810;
            transform: scale(1.05);
            background-color: #eaddcf;
        }

        .file-drag-active {
            background-color: #fff8e1 !important;
            border-color: #2C1810 !important;
            transform: scale(1.02);
        }

        .cart-badge {
            animation: cartBounce 0.4s ease;
        }

        @keyframes cartBounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ChevronRight, ChevronLeft, Scroll, FileText, BookOpenCheck, Check, Globe, Lock, Plus, Trash2, Save, X, Edit3, BookOpen, ChevronDown, UploadCloud, GripVertical, Image as ImageIcon, FileUp, Loader2, MapPin, Package, Download, UserCog, ShieldCheck, LogOut, KeyRound, Crown, ShoppingCart, Users, User } from 'lucide-react';
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, doc, setDoc, updateDoc, addDoc, deleteDoc, onSnapshot, writeBatch, query, orderBy, serverTimestamp, getDoc } from "firebase/firestore";
        import { getStorage, ref, uploadBytes, getDownloadURL, listAll, deleteObject } from "firebase/storage";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence } from "firebase/auth";

        const firebaseConfig = {
            // ⚠️ חשוב: הרץ את migrate-to-harav.html לפני העלייה לפרודקשן!
            // לאחר ההגירה — כל הנתונים (ספרים, הזמנות, הגדרות, Storage) יהיו בפרויקט harav-tabady.
            apiKey: "AIzaSyC9dUKsuyJgt3DD1TORbfOzFKdsIOGJ65s",
            authDomain: "harav-tabady.firebaseapp.com",
            projectId: "harav-tabady",
            storageBucket: "harav-tabady.firebasestorage.app",
            messagingSenderId: "102830776454",
            appId: "1:102830776454:web:5ebc97830d5e86a1313107"
        };

        const NEWSLETTER_SITE_URL = "../index.html";
        const DEFAULT_NOTIFICATIONS = { managerEmail: "", orderWebhookUrl: "", web3formsKey: "" };

        const DEFAULT_RABBI = {
            title: "הרב בנימין טבדי שליט\"א",
            subtitle: "ראש בית מדרש 'לשמה'",
            description: "הרב בנימין טבדי, העומד בראש בית המדרש 'לשמה', ידוע בשיעוריו המעמיקים ובגישתו הייחודית המשלבת למדנות קלאסית עם בהירות מחשבתית יוצאת דופן.\nספרו החדש הוא פרי של שנים של הרבצת תורה והדרכת תלמידים.",
            imageUrl: "https://firebasestorage.googleapis.com/v0/b/harav-tabady.firebasestorage.app/o/tabady_pic.jpg?alt=media"
        };

        const DEFAULT_LOCATIONS = [
            "בני ברק: 0556681710 (הרב נוימן)", "רמת גן: 0523115598 (הרב עמיחי)", "גבעתיים: 0508807781 (הרב רותם)",
            "תל אביב: 0508807781 (הרב רותם)", "יפו: 0537544056 (בנימין)", "חולון: 0537544049 (גבי)",
            "בת ים: 0537544049 (גבי)", "פתח תקוה: 0526299182 (יעקב)", "גבעת שמואל: 0524434955 (נהוראי)",
            "אלעד: 0545887930 (אמיר)", "לוד: 0537544056 (בנימין)", "רעננה: 0537544056 (בנימין)",
            "רמת השרון: 0537544056 (בנימין)", "ירושלים, קרית משה: 0528384964 (יהונתן)", "ירושלים, קטמון: 0522349099 (בהירה)",
            'ירושלים העתיקה ("הרובע"): 0587577100 (אילה)', "בית אל: 0559720698 (רבקה)", "חשמונאים: 0522349099 (בהירה)",
            "שעלבים: 054422479 (אביעד)", "יד בנימין: 0537544056 (בנימין)", "אלון שבות: 0546601895 (הרב בניה)",
            "ברוכין: 0537544056 (בנימין)", "רבבה: 0543181713 (פלג)", "קרני שומרון: 052-698-3897 (מוטי)",
            "יצהר: 0585642619 (רעיה)", "חוות יאיר 0542492280 (אביעד)", "עלי: 0587577100 (אילה)", "ירוחם: 0528490288 (ישי)"
        ];

        let db, auth, storage;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            storage = getStorage(app);
            auth = getAuth(app);
        } catch (e) { console.error("Firebase init error:", e); }

        function App() {
            const [books, setBooks] = useState([]);
            const [currentBookIndex, setCurrentBookIndex] = useState(0);
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [isStaffMode, setIsStaffMode] = useState(false);

            const [isEditing, setIsEditing] = useState(false);
            const [isNewBookMode, setIsNewBookMode] = useState(false);
            const [editFormData, setEditFormData] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [rememberMe, setRememberMe] = useState(false);

            const [isLoading, setIsLoading] = useState(true);
            const [uploadingFile, setUploadingFile] = useState(null);
            const [operationStatus, setOperationStatus] = useState(null);

            const [pickupLocations, setPickupLocations] = useState([]);
            const [showLocationsModal, setShowLocationsModal] = useState(false);
            const [newLocationInput, setNewLocationInput] = useState("");

            const [teamList, setTeamList] = useState({ admins: [], secretaries: [] });
            const [showTeamModal, setShowTeamModal] = useState(false);
            const [newTeamEmail, setNewTeamEmail] = useState("");
            const [newTeamRole, setNewTeamRole] = useState("secretary");

            const [showOrdersModal, setShowOrdersModal] = useState(false);
            const [orders, setOrders] = useState([]);
            const [ordersLoading, setOrdersLoading] = useState(true);
            const [editingOrderId, setEditingOrderId] = useState(null);
            const [editOrderData, setEditOrderData] = useState({});
            const DEFAULT_BIT_URL = 'https://www.bitpay.co.il/app/me/F2DC5A6B-A704-0679-391A-774B7D5C126FBA38';
            const DEFAULT_PAYBOX_URL = 'https://links.payboxapp.com/4o515zMts0b';
            const [paymentLinks, setPaymentLinks] = useState({ bitUrl: DEFAULT_BIT_URL, payboxUrl: DEFAULT_PAYBOX_URL, paymentPhone: '', whatsappUrl: '' });
            const [editingPaymentLink, setEditingPaymentLink] = useState(null);
            const [paymentLinkInput, setPaymentLinkInput] = useState('');
            const [notifications, setNotifications] = useState(DEFAULT_NOTIFICATIONS);
            const [editingNotif, setEditingNotif] = useState(null);
            const [notifInput, setNotifInput] = useState('');

            const [rabbiProfile, setRabbiProfile] = useState(null);
            const [showRabbiModal, setShowRabbiModal] = useState(false);
            const [rabbiFormData, setRabbiFormData] = useState(null);
            const [uploadingRabbiImage, setUploadingRabbiImage] = useState(false);

            const [formStatus, setFormStatus] = useState('idle');
            const [fullName, setFullName] = useState("");
            const [phone, setPhone] = useState("");
            const [pickupLocation, setPickupLocation] = useState('');
            const [shippingAddress, setShippingAddress] = useState('');
            const [paymentConfirmed, setPaymentConfirmed] = useState(false);
            const [slideIndex, setSlideIndex] = useState(0);
            const [showCart, setShowCart] = useState(false);
            const orderFormRef = React.useRef(null);

            const [draggedItemIndex, setDraggedItemIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const [fileDragActive, setFileDragActive] = useState(null);

            // סל קניות - מערך של {bookId, title, price}
            const [cart, setCart] = useState([]);

            const SHIPPING_COST = 30;
            const parsePrice = (p) => Number(String(p || '').replace(/[^0-9.]/g, '')) || 0;
            const cartBooksTotal = cart.reduce((sum, item) => sum + parsePrice(item.price) * (item.qty || 1), 0);
            const cartShipping = pickupLocation.includes('דואר') ? SHIPPING_COST : 0;
            const cartTotal = cartBooksTotal + cartShipping;
            const cartCount = cart.reduce((sum, item) => sum + (item.qty || 1), 0);

            // Subscriptions
            useEffect(() => {
                const unsubscribe = onSnapshot(collection(db, "books"), (snapshot) => {
                    const booksData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    booksData.sort((a, b) => (a.order || 0) - (b.order || 0));
                    setBooks(booksData);
                    setIsLoading(false);
                }, () => setIsLoading(false));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const unsubscribeLocations = onSnapshot(doc(db, "settings", "pickupLocations"), (docSnapshot) => {
                    if (docSnapshot.exists()) setPickupLocations(docSnapshot.data().list || []);
                    else setPickupLocations(DEFAULT_LOCATIONS);
                }, () => setPickupLocations(DEFAULT_LOCATIONS));
                return () => unsubscribeLocations();
            }, []);

            useEffect(() => {
                const unsub = onSnapshot(doc(db, "settings", "rabbiProfile"), (docSnapshot) => {
                    if (docSnapshot.exists()) setRabbiProfile(docSnapshot.data());
                    else setRabbiProfile(null);
                }, () => setRabbiProfile(null));
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribeTeam = onSnapshot(doc(db, "settings", "team"), (docSnapshot) => {
                    if (docSnapshot.exists()) setTeamList(docSnapshot.data());
                }, () => { });
                return () => unsubscribeTeam();
            }, [user]);

            useEffect(() => {
                if (isStaffMode && showOrdersModal) {
                    setOrdersLoading(true);
                    const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
                    const unsubscribeOrders = onSnapshot(q, (snapshot) => {
                        const ordersData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setOrders(ordersData);
                        setOrdersLoading(false);
                    }, (err) => { console.error("Orders access error:", err); setOrdersLoading(false); });
                    return () => unsubscribeOrders();
                }
            }, [isStaffMode, showOrdersModal]);

            useEffect(() => {
                const unsub = onSnapshot(doc(db, "settings", "paymentLinks"), (docSnapshot) => {
                    if (docSnapshot.exists()) {
                        const data = docSnapshot.data();
                        setPaymentLinks({ bitUrl: data.bitUrl || DEFAULT_BIT_URL, payboxUrl: data.payboxUrl || DEFAULT_PAYBOX_URL, paymentPhone: data.paymentPhone || '', whatsappUrl: data.whatsappUrl || '' });
                    }
                }, () => {});
                return () => unsub();
            }, []);

            useEffect(() => {
                const unsub = onSnapshot(doc(db, "settings", "notifications"), (docSnapshot) => {
                    if (docSnapshot.exists()) {
                        const data = docSnapshot.data();
                        setNotifications({ managerEmail: data.managerEmail || '', orderWebhookUrl: data.orderWebhookUrl || '', web3formsKey: data.web3formsKey || '' });
                    }
                }, () => {});
                return () => unsub();
            }, []);

            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, async (u) => {
                    setUser(u);
                    if (u) {
                        try {
                            const email = u.email.toLowerCase();
                            const snap = await getDoc(doc(db, "settings", "team"));
                            let role = null;
                            if (snap.exists()) {
                                const data = snap.data();
                                const admins = (data.admins || []).map(e => e.toLowerCase());
                                const secretaries = (data.secretaries || []).map(e => e.toLowerCase());
                                if (admins.includes(email)) role = 'admin';
                                else if (secretaries.includes(email)) role = 'secretary';
                            } else { role = 'admin'; }
                            if (role) {
                                setUserRole(role);
                                setIsStaffMode(true);
                                if (role === 'secretary') setShowOrdersModal(true);
                            } else {
                                alert("אין לך הרשאות גישה למערכת זו.");
                                await signOut(auth);
                                setUserRole(null);
                                setIsStaffMode(false);
                            }
                        } catch (err) {
                            console.error("Role check failed:", err);
                            setIsStaffMode(false);
                        }
                    } else {
                        setIsStaffMode(false);
                        setUserRole(null);
                        setShowOrdersModal(false);
                        setIsEditing(false);
                    }
                });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (currentBookIndex >= books.length && books.length > 0) setCurrentBookIndex(0);
            }, [books.length]);

            const currentBook = books.length > 0 ? books[currentBookIndex] : null;

            // איפוס השקופית במעבר בין ספרים — מונע אינדקס חורג מטווח
            useEffect(() => { setSlideIndex(0); }, [currentBookIndex, currentBook?.id]);

            // Preload לכל תמונות הספרים — מעבר מיידי מה-cache בלי הבזקת תמונה ישנה
            useEffect(() => {
                books.forEach(b => (b.images || []).forEach(src => { if (src) { const im = new Image(); im.decoding = 'async'; im.src = src; } }));
            }, [books]);

            // סל - הוספה והסרה
            const addToCart = (book) => {
                setCart(prev => {
                    const existing = prev.find(item => item.bookId === book.id);
                    if (existing) return prev.map(item => item.bookId === book.id ? { ...item, qty: (item.qty || 1) + 1 } : item);
                    return [...prev, { bookId: book.id, title: book.title, price: parsePrice(book.price), qty: 1 }];
                });
            };

            const removeFromCart = (index) => {
                setCart(prev => {
                    const item = prev[index];
                    if (item && (item.qty || 1) > 1) return prev.map((it, i) => i === index ? { ...it, qty: it.qty - 1 } : it);
                    return prev.filter((_, i) => i !== index);
                });
            };

            const clearCart = () => {
                setCart([]);
            };

            const handleLogout = async () => {
                try {
                    await signOut(auth);
                    setUser(null);
                    setIsStaffMode(false);
                    setUserRole(null);
                    setShowLogin(false);
                    setShowOrdersModal(false);
                } catch (error) { console.error("Logout Error:", error); }
            };

            const addTeamMember = async () => {
                if (!newTeamEmail.trim()) return;
                const email = newTeamEmail.trim().toLowerCase();
                let updatedTeam = { ...teamList };
                if (!updatedTeam.admins) updatedTeam.admins = [];
                if (!updatedTeam.secretaries) updatedTeam.secretaries = [];
                updatedTeam.admins = updatedTeam.admins.filter(e => e.toLowerCase() !== email);
                updatedTeam.secretaries = updatedTeam.secretaries.filter(e => e.toLowerCase() !== email);
                if (newTeamRole === 'admin') updatedTeam.admins.push(email);
                else updatedTeam.secretaries.push(email);
                try {
                    await setDoc(doc(db, "settings", "team"), updatedTeam);
                    setNewTeamEmail("");
                    alert("איש צוות עודכן בהצלחה!");
                } catch (e) { alert("שגיאה: " + e.message); }
            };

            const removeTeamMember = async (email) => {
                if (!confirm("להסיר גישה?")) return;
                let updatedTeam = { ...teamList };
                updatedTeam.admins = (updatedTeam.admins || []).filter(e => e !== email);
                updatedTeam.secretaries = (updatedTeam.secretaries || []).filter(e => e !== email);
                try { await setDoc(doc(db, "settings", "team"), updatedTeam); } catch (e) { alert("שגיאה: " + e.message); }
            };

            const openRabbiEdit = () => { setRabbiFormData({ title: rabbiProfile?.title ?? '', subtitle: rabbiProfile?.subtitle ?? '', description: rabbiProfile?.description ?? '', imageUrl: rabbiProfile?.imageUrl ?? '' }); setShowRabbiModal(true); };
            const saveRabbiProfile = async () => { try { await setDoc(doc(db, "settings", "rabbiProfile"), rabbiFormData); setShowRabbiModal(false); alert("פרופיל הרב נשמר."); } catch (e) { alert("שגיאה: " + e.message); } };
            const uploadRabbiImage = async (file) => { if (!file) return; if (file.size > 2 * 1024 * 1024) { alert("התמונה גדולה מדי (מקסימום 2MB)"); return; } setUploadingRabbiImage(true); try { const storageRef = ref(storage, "settings/rabbiProfile.jpg"); await uploadBytes(storageRef, file); const url = await getDownloadURL(storageRef); setRabbiFormData(prev => ({ ...prev, imageUrl: url })); } catch (err) { alert("שגיאה: " + err.message); } finally { setUploadingRabbiImage(false); } };

            const savePaymentLink = async (field) => { try { const updated = { ...paymentLinks, [field]: paymentLinkInput }; await setDoc(doc(db, "settings", "paymentLinks"), updated); setEditingPaymentLink(null); setPaymentLinkInput(''); } catch (e) { alert("שגיאה: " + e.message); } };
            const saveNotification = async (field) => { try { const updated = { ...notifications, [field]: notifInput }; await setDoc(doc(db, "settings", "notifications"), updated, { merge: true }); setEditingNotif(null); setNotifInput(''); } catch (e) { alert("שגיאה: " + e.message); } };

            const startOrderEdit = (order) => { setEditingOrderId(order.id); setEditOrderData({ ...order }); };
            const cancelOrderEdit = () => { setEditingOrderId(null); setEditOrderData({}); };
            const saveOrderEdit = async (orderId) => { try { await updateDoc(doc(db, "orders", orderId), editOrderData); setEditingOrderId(null); } catch (e) { alert("שגיאה: " + e.message); } };
            const deleteOrder = async (orderId) => { if (!confirm("למחוק?")) return; try { await deleteDoc(doc(db, "orders", orderId)); } catch (e) { alert("שגיאה: " + e.message); } };
            const downloadOrdersCSV = () => {
                const BOM = "\uFEFF";
                const headers = ["תאריך", "שם מלא", "טלפון", "ספרים", "מסירה", "מחיר", "סטטוס", "הערות"];
                const rows = orders.map(o => {
                    const date = o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleDateString("he-IL") : "-";
                    const bookTitles = o.items ? o.items.map(i => (i.qty || 1) > 1 ? `${i.title} x${i.qty}` : i.title).join(" | ") : (o.bookTitle || "");
                    return [date, `"${o.customerName || ''}"`, `"${o.customerPhone || ''}"`, `"${bookTitles}"`, `"${o.pickupLocation || ''}"`, o.price || "-", o.status || "חדש", `"${o.notes || ''}"`];
                });
                const csvContent = BOM + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csvContent], { type: "text/csv;charset=utf-8;" }));
                link.download = "orders.csv";
                link.click();
            };

            const addLocation = async () => { if (!newLocationInput.trim()) return; const updatedList = [...pickupLocations, newLocationInput.trim()]; setNewLocationInput(""); try { await setDoc(doc(db, "settings", "pickupLocations"), { list: updatedList }); } catch (e) { } };
            const removeLocation = async (index) => { if (!confirm("למחוק?")) return; const updatedList = pickupLocations.filter((_, i) => i !== index); try { await setDoc(doc(db, "settings", "pickupLocations"), { list: updatedList }); } catch (e) { } };

            const handleFileUpload = async (file, type) => {
                if (!file) return;

                                                    </div>
                                                )}
                                                <div className="flex justify-between items-center mt-3 pt-3 border-t border-[#eaddcf]">
                                                    <span className="font-bold text-[#2C1810]">סה"כ:</span>
                                                    <span className="price-gold text-2xl font-black title-font">{displayTotal} ש"ח</span>
                                                </div>
                                                <button onClick={clearCart} className="mt-2 text-xs text-gray-400 hover:text-red-500 flex items-center gap-1"><Trash2 size={12} /> רוקן סל</button>
                                            </div>
                                            {/* ── Divider ── */}
                                            <div className="h-3 bg-[#f3e5ce] border-y border-[#eaddcf]"></div>
                                            {/* ── Checkout Form ── */}
                                            <div className="px-5 py-5">
                                                <div className="text-xs font-bold text-[#9a8066] mb-4 tracking-wide">פרטי הזמנה</div>
                                                <form onSubmit={(e) => { handleFormSubmit(e); }} className="space-y-4">
                                                    <div>
                                                        <label className="block text-sm font-bold text-[#5d4037] mb-1">שם מלא</label>
                                                        <input type="text" required className="w-full px-4 py-2.5 bg-white border border-[#d7ccc8] rounded-lg focus:outline-none focus:border-[#b38728] text-sm" placeholder="ישראל ישראלי" value={fullName} onChange={e => setFullName(e.target.value)} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-bold text-[#5d4037] mb-1">מספר טלפון</label>
                                                        <input type="tel" required className="w-full px-4 py-2.5 bg-white border border-[#d7ccc8] rounded-lg focus:outline-none focus:border-[#b38728] text-sm" placeholder="050-0000000" value={phone} onChange={e => setPhone(e.target.value)} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-bold text-[#5d4037] mb-1">נקודת איסוף / משלוח (חובה)</label>
                                                        <div className="relative">
                                                            <select required className="w-full px-4 py-2.5 bg-white border border-[#d7ccc8] rounded-lg focus:outline-none focus:border-[#b38728] appearance-none text-[#2C1810] text-sm" value={pickupLocation} onChange={e => setPickupLocation(e.target.value)}>
                                                                <option value="" disabled>בחר אזור...</option>
                                                                {pickupLocations.map((loc, i) => <option key={i} value={loc}>{loc}</option>)}
                                                                <option disabled>──────────</option>
                                                                <option value="שליחה בדואר (תוספת 30 שח)">שליחה בדואר (תוספת 30 ₪)</option>
                                                                <option value="משלוח לחול">משלוח לחו"ל</option>
                                                            </select>
                                                            <ChevronDown className="absolute left-3 top-3 text-[#2C1810] pointer-events-none" size={18} />
                                                        </div>
                                                    </div>
                                                    {pickupLocation.includes('דואר') && (
                                                        <div>
                                                            <label className="block text-xs font-bold text-[#b38728] mb-1">כתובת למשלוח</label>
                                                            <input type="text" className="w-full px-4 py-2.5 bg-white border-2 border-[#b38728] rounded-lg text-sm" placeholder="רחוב, מספר, עיר" value={shippingAddress} onChange={e => setShippingAddress(e.target.value)} />
                                                        </div>
                                                    )}
                                                    {pickupLocation.includes('חול') && (
                                                        <div className="p-3 bg-[#fff8e1] border border-[#b38728] text-[#2C1810] rounded-lg text-center font-bold text-sm">
                                                            <Globe className="inline-block w-4 h-4 ml-1" /> המזכירה תיצור קשר למשלוח לחו"ל.
                                                        </div>
                                                    )}
                                                    {!pickupLocation.includes('חול') && (
                                                        <div className="space-y-3 pt-1">
                                                            <p className="text-center text-xs text-[#5d4037]">שלב 1 — בצעו תשלום ({displayTotal} ש"ח):</p>
                                                            <div className="grid grid-cols-2 gap-4">
                                                                <a href={displayTotal > 0 ? `${paymentLinks.payboxUrl}${paymentLinks.payboxUrl.includes('?') ? '&' : '?'}amount=${Math.round(displayTotal)}` : '#'} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center no-underline">
                                                                    <div className="bg-[#fff8e1] rounded-xl border-2 border-[#ffc400] p-3 cursor-pointer hover:scale-105 hover:shadow-lg transition-all w-full flex items-center justify-center">
                                                                        <img src="https://firebasestorage.googleapis.com/v0/b/harav-tabady.firebasestorage.app/o/paybox.png?alt=media" onError={e => e.target.src='https://firebasestorage.googleapis.com/v0/b/sfarim-tabady.firebasestorage.app/o/paybox.png?alt=media'} className="w-12 h-12 object-contain" alt="PayBox" />
                                                                    </div>
                                                                </a>
                                                                <a href={displayTotal > 0 ? `${paymentLinks.bitUrl}${paymentLinks.bitUrl.includes('?') ? '&' : '?'}amount=${Math.round(displayTotal)}` : '#'} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center no-underline">
                                                                    <div className="bg-[#e0f7fa] rounded-xl border-2 border-[#00cbf1] p-3 cursor-pointer hover:scale-105 hover:shadow-lg transition-all w-full flex items-center justify-center">
                                                                        <img src="https://firebasestorage.googleapis.com/v0/b/harav-tabady.firebasestorage.app/o/bit.png?alt=media" onError={e => e.target.src='https://firebasestorage.googleapis.com/v0/b/sfarim-tabady.firebasestorage.app/o/bit.png?alt=media'} className="w-12 h-12 object-contain" alt="Bit" />
                                                                    </div>
                                                                </a>
                                                            </div>
                                                            {paymentLinks.paymentPhone && (
                                                                <p className="text-center text-sm text-[#5d4037]">
                                                                    העברה עצמאית / יצירת קשר: <a href={`tel:${paymentLinks.paymentPhone}`} className="font-bold text-[#2C1810] underline" dir="ltr">{paymentLinks.paymentPhone}</a>
                                                                </p>
                                                            )}
                                                            {paymentLinks.whatsappUrl && (
                                                                <div className="flex justify-center">
                                                                    <a href={paymentLinks.whatsappUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 no-underline">
                                                                        <svg viewBox="0 0 24 24" fill="#25D366" className="w-8 h-8"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                                                        <span className="text-sm font-bold text-[#25D366]">WhatsApp לתיאום</span>
                                                                    </a>
                                                                </div>
                                                            )}
                                                            <div className="flex items-start gap-3 p-3 bg-white rounded-lg border border-[#eaddcf]">
                                                                <input type="checkbox" id="paychk2" className="mt-1 w-4 h-4 accent-[#b38728]" checked={paymentConfirmed} onChange={e => setPaymentConfirmed(e.target.checked)} />
                                                                <label htmlFor="paychk2" className="text-sm font-bold text-[#2C1810] cursor-pointer">שלב 2 — אני מאשר/ת ששילמתי</label>
                                                            </div>
                                                        </div>
                                                    )}
                                                    <button type="submit" disabled={formStatus === 'submitting' || displayItems.length === 0} className="w-full py-3.5 bg-[#241A14] text-white font-bold rounded-xl hover:bg-[#3d2a1f] shadow-md disabled:opacity-50 transition-colors">
                                                        {formStatus === 'submitting' ? 'שולח...' : 'שלב 3 — אישור ההזמנה'}
                                                    </button>
                                                </form>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex-1 flex flex-col items-center justify-center text-center px-8 py-16">
                                            <div className="w-16 h-16 rounded-full bg-[#f3e5ce] flex items-center justify-center mb-4 text-[#b38728]">
                                                <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                                            </div>
                                            <div className="font-bold text-[#2C1810] mb-1">הסל ריק</div>
                                            <p className="text-sm text-[#8d6e63] mb-5">הוסיפו ספרים לסל כדי להמשיך</p>
                                            <button onClick={() => setShowCart(false)} className="px-5 py-2.5 border-2 border-[#A9852F] text-[#A9852F] font-bold rounded-lg hover:bg-[#A9852F] hover:text-white transition-all">לעיון בספרים</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                                        <div className="w-full max-w-4xl px-6 pt-4 text-right text-sm font-bold opacity-60">בס"ד</div>

                    <nav className="w-full max-w-5xl px-6 mt-6 mb-4">
                        <div className="flex items-stretch gap-3 overflow-x-auto no-scrollbar pb-1">
                            {books.length > 0 ? books.map((book, idx) => (
                                <button key={book.id || idx} onClick={() => { setCurrentBookIndex(idx); setSlideIndex(0); }} draggable={userRole === 'admin'} onDragStart={(e) => userRole === 'admin' && handleDragStart(e, idx)} onDragEnter={() => userRole === 'admin' && handleDragEnter(idx)} onDragEnd={handleDragEnd} onDragOver={(e) => userRole === 'admin' && e.preventDefault()} onDrop={(e) => userRole === 'admin' && handleDrop(e, idx)} className={`group relative shrink-0 flex items-center gap-3 px-3 py-2 rounded-2xl border transition-all ${currentBookIndex === idx ? 'bg-white border-[#A9852F] shadow-md ring-1 ring-[#A9852F]/30' : 'bg-white/60 border-[#eaddcf] hover:border-[#d9c9a3] hover:bg-white'} ${userRole === 'admin' ? 'cursor-move' : 'cursor-pointer'} ${draggedItemIndex === idx ? 'opacity-50' : ''} ${dragOverIndex === idx ? 'drag-over' : ''}`}>
                                    {userRole === 'admin' && <GripVertical size={12} className="opacity-30 shrink-0" />}
                                    <span className={`w-9 h-12 rounded-md overflow-hidden shrink-0 border ${currentBookIndex === idx ? 'border-[#A9852F]' : 'border-[#eaddcf]'} bg-[#f3e5ce] flex items-center justify-center`}>
                                        {book.images && book.images[0] ? <img src={book.images[0]} className="w-full h-full object-cover" /> : <BookOpen size={16} className="text-[#b38728]" />}
                                    </span>
                                    <span className="text-right">
                                        <span className={`block whitespace-nowrap font-bold leading-tight title-font text-[15px] ${currentBookIndex === idx ? 'text-[#2C1810]' : 'text-[#6b5d4f]'}`}>{book.title}</span>
                                        {book.price && <span className={`block text-xs ${currentBookIndex === idx ? 'text-[#A9852F]' : 'text-[#a99a82]'}`}>{book.price} ₪</span>}
                                    </span>
                                    {currentBookIndex === idx && <span className="absolute -bottom-px left-4 right-4 h-[3px] rounded-full bg-[#A9852F]"></span>}
                                </button>
                            )) : <div className="text-gray-500 italic p-2">אין ספרים להצגה</div>}
                        </div>
                    </nav>

                    {currentBook ? (
                        <>
                            <header className="w-full max-w-5xl px-6 pt-2 pb-10">
                                <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center">
                                    <div className="text-center md:text-right order-2 md:order-1">
                                        <div className="text-xs font-bold tracking-[3px] text-[#A9852F] mb-3">ספר חדש</div>
                                        <h1 className="title-font text-6xl md:text-7xl font-bold leading-none text-[#2C1810] mb-3">{currentBook.title}</h1>
                                        <h2 className="text-xl md:text-2xl text-[#5d4037] font-bold mb-4">{currentBook.subtitle}</h2>
                                        {(currentBook.marketingTitle || currentBook.marketingSubtitle) && (
                                            <p className="text-[#6b5d4f] text-lg leading-relaxed mb-6">{currentBook.marketingTitle}{currentBook.marketingTitle && currentBook.marketingSubtitle ? ' · ' : ''}<span className="font-black text-[#A9852F]">{currentBook.marketingSubtitle}</span></p>
                                        )}
                                        <div className="flex items-center justify-center md:justify-start gap-5 flex-wrap mb-5">
                                            <span className="title-font price-gold text-5xl md:text-6xl font-bold leading-none">{currentBook.price} ש"ח</span>
                                            <button onClick={() => { addToCart(currentBook); setShowCart(true); }} className="flex items-center gap-2 bg-[#241A14] hover:bg-[#3d2a1f] text-white px-7 py-3.5 rounded-xl font-bold shadow-lg transition-all hover:scale-[1.03]"><ShoppingCart size={20} /> הוסף לסל</button>
                                        </div>
                                        {(currentBook.downloads?.toc || currentBook.downloads?.sample) && (
                                            <div className="flex flex-wrap justify-center md:justify-start gap-3">
                                                {currentBook.downloads?.toc && <a href={currentBook.downloads.toc} target="_blank" className="flex items-center gap-2 px-5 py-2.5 border-2 border-[#5d4037] text-[#5d4037] font-bold rounded-lg hover:bg-[#5d4037] hover:text-white transition-all no-underline text-sm"><FileText size={18} /> תוכן עניינים</a>}
                                                {currentBook.downloads?.sample && <a href={currentBook.downloads.sample} target="_blank" className="flex items-center gap-2 px-5 py-2.5 border-2 border-[#A9852F] text-[#A9852F] font-bold rounded-lg hover:bg-[#A9852F] hover:text-white transition-all no-underline text-sm"><BookOpenCheck size={18} /> הורד דוגמא</a>}
                                            </div>
                                        )}
                                    </div>
                                    <div className="order-1 md:order-2 flex justify-center">
                                        <div className="relative w-full max-w-[300px] group">
                                            <div className="relative aspect-[4/5] w-full rounded-lg shadow-2xl overflow-hidden border-4 border-[#eaddcf] bg-white">
                                                {currentBook.images && currentBook.images[slideIndex] ? <img key={(currentBook.id || currentBookIndex) + '-' + slideIndex} src={currentBook.images[slideIndex]} decoding="async" className="absolute inset-0 w-full h-full object-contain scale-110" /> : <div className="flex items-center justify-center h-full text-gray-400 text-center p-4">אין תמונה</div>}
                                            </div>
                                            {currentBook.images && currentBook.images.length > 1 && <><button onClick={() => setSlideIndex(prev => prev === 0 ? currentBook.images.length - 1 : prev - 1)} className="absolute -right-5 top-1/2 -translate-y-1/2 bg-[#241A14] text-[#f3e5ce] p-2 rounded-full shadow-lg border border-[#b38728] hover:bg-[#5d4037] hover:scale-110 transition-all z-10"><ChevronRight /></button><button onClick={() => setSlideIndex(prev => prev === currentBook.images.length - 1 ? 0 : prev + 1)} className="absolute -left-5 top-1/2 -translate-y-1/2 bg-[#241A14] text-[#f3e5ce] p-2 rounded-full shadow-lg border border-[#b38728] hover:bg-[#5d4037] hover:scale-110 transition-all z-10"><ChevronLeft /></button></>}
                                        </div>
                                    </div>
                                </div>
                            </header>
                            <div className="w-full max-w-2xl mb-12 flex items-center justify-center text-[#b38728] opacity-80"><span className="h-[2px] w-full bg-gradient-to-r from-transparent via-[#b38728] to-transparent"></span><Scroll className="mx-4 w-10 h-10 shrink-0" /><span className="h-[2px] w-full bg-gradient-to-r from-transparent via-[#b38728] to-transparent"></span></div>
                            <section className="w-full max-w-4xl px-6 pb-8 space-y-8">
                                {currentBook.cells && currentBook.cells.map((cell, idx) => (
                                    <div key={idx} className={`relative overflow-hidden p-8 rounded-xl text-center shadow-md border ${idx === 1 ? 'bg-white/90 border-2 border-[#b38728] transform md:scale-105 z-10 shadow-lg' : 'bg-white/70 border-[#eaddcf]'}`}>
                                        <div className="absolute top-0 opacity-5 p-4 right-0">
                                            {idx === 0 && <BookOpen size={96} strokeWidth={1} color="#2C1810" />}
                                            {idx === 1 && <Scroll size={96} strokeWidth={1} color="#b38728" />}
                                            {idx === 2 && <Crown size={96} strokeWidth={1} color="#2C1810" />}
                                        </div>
                                        <h2 className="text-3xl font-bold mb-4 text-[#2C1810] title-font">{cell.title}</h2>
                                        <div className="text-xl leading-8 text-[#4e342e]" dangerouslySetInnerHTML={{ __html: formatText(cell.desc) }} />
                                    </div>
                                ))}
                                {(() => {
                                    const rabbi = rabbiProfile || DEFAULT_RABBI; return (
                                        <div className="relative overflow-hidden p-8 rounded-xl shadow-md border border-[#eaddcf] bg-[#4e342e] text-[#f3e5ce] flex flex-col md:flex-row gap-6 items-center text-right">
                                            <div className="flex-1 space-y-4">
                                                <div>
                                                    <h2 className="text-3xl font-bold text-[#b38728] title-font">{rabbi.title}</h2>
                                                    <h3 className="text-lg opacity-80">{rabbi.subtitle}</h3>
                                                </div>
                                                <div className="text-lg leading-8 opacity-90" dangerouslySetInnerHTML={{ __html: formatText(rabbi.description || '') }} />
                                            </div>
                                            <div className="shrink-0">
                                                <div className="w-48 h-48 rounded-full border-4 border-[#b38728] overflow-hidden shadow-xl bg-gray-300">
                                                    <img src={rabbi.imageUrl || ''} alt={rabbi.title} className="w-full h-full object-cover" onError={(e) => e.target.src = 'https://via.placeholder.com/200x200?text=תמונה'} />
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </section>
                        </>
                    ) : (
                        <div className="min-h-[50vh] flex flex-col items-center justify-center text-center p-4">
                            <h2 className="text-2xl font-bold text-[#2C1810] mb-2">ברוכים הבאים לבית מדרש לשמה</h2>
                            <p className="text-gray-600">כרגע לא מוצגים ספרים למכירה.</p>
                            {isStaffMode && userRole === 'admin' && <div className="text-sm text-blue-600 mt-4 bg-blue-50 p-2 rounded">טיפ למנהל: לחץ על <b>+ חדש</b> למעלה כדי להוסיף ספר.</div>}
                        </div>
                    )}

                    <footer className="w-full py-6 text-center text-[#8d6e63] text-sm bg-[#f3e5ce] mt-auto relative group">
                        <p>© כל הזכויות שמורות לבית מדרש 'לשמה'</p>
                        {!user && <button onClick={() => setShowLogin(true)} className="absolute bottom-2 left-2 opacity-0 group-hover:opacity-100 text-xs">כניסת מנהל</button>}
                    </footer>

                    {showLogin && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm">
                            <form onSubmit={handleLogin} className="bg-white p-8 rounded-xl shadow-2xl w-80 text-center relative border-4 border-[#2C1810]">
                                <button type="button" onClick={() => setShowLogin(false)} className="absolute top-2 right-2"><X size={20} /></button>
                                <h3 className="font-bold mb-4 text-[#2C1810]">כניסת מנהל</h3>
                                <input name="email" placeholder="אימייל" className="w-full p-2 border border-[#b38728] rounded mb-2" />
                                <input name="password" type="password" placeholder="סיסמה" className="w-full p-2 border border-[#b38728] rounded mb-2" />
                                <div className="flex items-center gap-2 mb-4 justify-start">
                                    <input type="checkbox" id="rememberMe" className="w-4 h-4 accent-[#2C1810]" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} />
                                    <label htmlFor="rememberMe" className="text-sm text-[#2C1810]">זכור אותי</label>
                                </div>
                                <button type="submit" className="w-full bg-[#2C1810] text-white py-2 rounded font-bold">התחבר</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
